# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: vlagent-hosted2
description: >
  A helpful AI assistant with account balance tool.
  Calls the mobile backend to retrieve account balance and optional aux card content.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - Account Balance
    - Voice Live Mobile
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: PROJECT_ENDPOINT
    value: ${PROJECT_ENDPOINT}
  - name: MODEL_DEPLOYMENT_NAME
    value: ${MODEL_DEPLOYMENT_NAME}
  - name: MOBILE_BACKEND_URL
    value: ${MOBILE_BACKEND_URL}
resources:
  cpu: '0.5'
  memory: 1.0Gi
dockerfile_path: Dockerfile
