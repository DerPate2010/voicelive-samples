name: voice-live-avatar
resourceGroup: rg-voice-live-mobile-backend
metadata:
  template: voice-live-avatar@0.1.0

infra:
  provider: bicep
  path: infra

services:
  web:
    project: .
    dist: out
    language: js
    host: staticwebapp

workflows:
  up:
    steps:
      - azd: provision
      - azd: package
      - azd: deploy --all
